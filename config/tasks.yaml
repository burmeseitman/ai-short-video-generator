research_task:
  description: >
    Research at least 3 compelling and interesting facts specifically about: '{topic}'.
    Focus only on this topic. Then identify at least 3 relevant English keywords suitable
    for searching video backgrounds related to '{topic}', and output them in the format:
    'Keywords: [values]'.
  expected_output: >
    A list of specific facts about '{topic}' and English keywords for video background searches.

write_task:
  description: >
    Using the researched facts about '{topic}', write an engaging English language
    script specifically about '{topic}' for a Shorts/TikTok video.
    The entire script MUST stay focused on '{topic}' — do not drift to other subjects.
    Write in a casual, conversational storytelling style that grabs and holds attention. 
    Hook the viewer in the very first line.
    
    CRITICAL INSTRUCTIONS:
    1. Write exactly 6 lines — one line per scene.
    2. Each line must be very long and highly detailed, around 25-35 words, so that it takes about 12-15 seconds of spoken voice to read. This ensures the final video is strictly over 60 seconds (1 minute) long.
  expected_output: >
    An engaging, grammatically correct English language script with exactly 6 long lines.

direct_task:
  description: >
    Read the provided English script about '{topic}' and break it down into exactly 6 scene cuts.
    For each scene, keep the SCRIPT line exactly as written in English.
    Then design the visual perspective, camera shot, lighting, and detailed English prompt
    for an AI video generator. All visuals MUST be relevant to '{topic}'.
    Output ONLY in the exact format below — no extra text, no markdown wrappers:

    TITLE: [Video title about {topic} with relevant hashtags]

    SCENES:
    - SCRIPT: [English narration line 1 — keep original text]
      VISUAL_PROMPT: [Detailed English AI Video Generator prompt matching this scene and '{topic}' (e.g. Cinematic shot of..., camera perspective, lighting, high detail)]
      SEARCH_QUERY: [1-3 English keywords for stock video search (e.g. futuristic city)]
    - SCRIPT: [English narration line 2 — keep original text]
      VISUAL_PROMPT: [Detailed English AI Video Generator prompt matching this scene and '{topic}']
      SEARCH_QUERY: [1-3 English keywords]
    - SCRIPT: [English narration line 3 — keep original text]
      VISUAL_PROMPT: [Detailed English AI Video Generator prompt matching this scene and '{topic}']
      SEARCH_QUERY: [1-3 English keywords]
    - SCRIPT: [English narration line 4 — keep original text]
      VISUAL_PROMPT: [Detailed English AI Video Generator prompt matching this scene and '{topic}']
      SEARCH_QUERY: [1-3 English keywords]
    - SCRIPT: [English narration line 5 — keep original text]
      VISUAL_PROMPT: [Detailed English AI Video Generator prompt matching this scene and '{topic}']
      SEARCH_QUERY: [1-3 English keywords]
    - SCRIPT: [English narration line 6 — keep original text]
      VISUAL_PROMPT: [Detailed English AI Video Generator prompt matching this scene and '{topic}']
      SEARCH_QUERY: [1-3 English keywords]
  expected_output: >
    A structured text output containing TITLE and exactly 6 SCENES.
    Each SCRIPT must be in English. Each VISUAL_PROMPT must be in English.
    All content focused on '{topic}', in the exact specified format.

critique_task:
  description: >
    Take the SCENE_FLOW generated by the Director and the English script generated by the Writer. 
    Review each scene's time-stamps (e.g., 0s-4s, 4s-9s) to guarantee the pacing is mathematically correct. 
    Audit the recommended asset types (Photos, Videos, GIFs) and search queries to ensure visual continuity 
    and that they accurately represent the '{topic}' topic without breaking the narrative flow. 
    Output only the finalized, approved structural layout data in the same TITLE + SCENES format as the Director.
  expected_output: >
    A verified and clean structured format containing TITLE and exactly 6 SCENES with finalized SCRIPT, VISUAL_PROMPT, and SEARCH_QUERY for each scene.