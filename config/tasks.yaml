research_task:
  description: >
    Conduct deep, high-retention research on the provided '{topic}'. Extract at least 3 jaw-dropping, 
    highly unusual, or controversial facts tailored for short-form engagement. Identify a single, 
    highly optimized English search keyword designed for royalty-free stock media platforms to discover 
    evocative background assets. Output the data cleanly, focusing exclusively on the core topic.
  expected_output: >
    A list of 3 high-impact facts and a single, targeted English keyword optimized for stock asset searches.

write_task:
  description: >
    Using the researched facts, write a gripping, fast-paced short-form video script entirely in highly 
    conversational, spoken-style Burmese (အပြောစတိုင်). The script must hook the viewer in the first 2 seconds 
    and completely avoid dry, literary language. 

    CRITICAL EXECUTION INSTRUCTIONS:
    You must format the final script output natively using SSML (Speech Synthesis Markup Language) tags to control pacing. 
    1. Embed `<break time="300ms"/>` or `<break time="500ms"/>` tags at natural human breathing gaps and sentence boundaries.
    2. Wrap high-impact terms or core keywords inside `<emphasis level="strong">...</emphasis>` tags to force a dramatic audio delivery.
    3. Ensure the complete spoken script duration totals roughly 45 to 60 seconds of natural speech.
  expected_output: >
    A verified, high-retention conversational Burmese script fully wrapped and formatted inside standard SSML tags.

direct_task:
  description: >
    Analyze the generated Burmese SSML script, estimate its timing, and mathematically break the timeline down 
    into a continuous storyboard of strict 3-to-5 second sequential scenes. 
    For each scene block, keep the exact Burmese SSML script portion assigned to it. 

    ASSET CURATION DICTATES:
    Since this workflow relies strictly on royalty-free stock media instead of AI generation, you must determine 
    the best specific asset type for each scene block. Assign either: 'PHOTO' (for abrupt dramatic pauses), 'VIDEO' 
    (for smooth cinematic transitions), or 'GIF' (for high-energy loops). Provide optimized English search keywords 
    tailored to pull accurate matching files from stock websites.

    Strictly maintain the format below with no extra text or markdown wrappers:

    TITLE: [Video title with relevant viral hashtags]

    SCENES:
    - TIMESTAMP: [e.g., 0s-4s]
      ASSET_TYPE: [PHOTO, VIDEO, or GIF]
      SCRIPT: [Exact Burmese SSML snippet for this block]
      SEARCH_QUERY: [1-3 precise English keywords for stock site searching]
  expected_output: >
    A structured layout string defining the TITLE and a strict sequential list of SCENES mapped with precise timestamps, asset types, and queries.

critique_task:
  description: >
    Act as a brutal quality assurance gatekeeper. Audit the Director's output structural layout and match it against the Writer's Burmese script. 
    Ensure absolute precision across three checkpoints:
    1. Pacing Validation: Mathematically cross-check that all scene timestamps stack up flawlessly to equal the total estimated audio duration.
    2. Asset Continuity: Verify that the designated ASSET_TYPE switches frequently enough to sustain maximum viewer retention without visual monotony.
    3. Query Audit: Reject generic search keywords; ensure all English SEARCH_QUERY values are sharp, relevant to '{topic}', and high-intent.

    Output the finalized blueprint using the exact same format provided by the Director.
  expected_output: >
    A verified and clean structured format containing the approved TITLE and sequential SCENES with finalized TIMESTAMP, ASSET_TYPE, SCRIPT, and SEARCH_QUERY keys.